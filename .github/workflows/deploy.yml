name: 🚀 Deploy SuratKama Mascots to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # Allow manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build production bundle
        run: npm run build
        env:
          # ── Firebase ──────────────────────────────────────────────────────
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY || 'AIzaSyBmM6wtVDelfk0G5naLlXmWdHedbacY44A' }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN || 'suratkama-mascots-df433.firebaseapp.com' }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID || 'suratkama-mascots-df433' }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET || 'suratkama-mascots-df433.firebasestorage.app' }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID || '834130534182' }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID || '1:834130534182:web:06e9f0c488caa97553abe7' }}
          # ── Google OAuth ──────────────────────────────────────────────────
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          # ── Razorpay ──────────────────────────────────────────────────────
          VITE_RAZORPAY_KEY_ID: ${{ secrets.VITE_RAZORPAY_KEY_ID }}
          # ── App URLs ──────────────────────────────────────────────────────
          VITE_APP_NAME: SuratKama Mascots
          VITE_APP_URL: https://siddhganesh.github.io/suratkama-mascots
          # ── Google Analytics (optional) ───────────────────────────────────
          VITE_GA_MEASUREMENT_ID: ${{ secrets.VITE_GA_MEASUREMENT_ID || 'G-VF5WXMQDY9' }}

      - name: 📄 Setup Pages
        uses: actions/configure-pages@v5

      - name: 📤 Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: 🌐 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
